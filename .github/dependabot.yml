version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels: ["dependencies", "automated"]
    groups:
      github-actions-all:
        patterns: ["*"]

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels: ["dependencies", "automated"]
    groups:
      bundler-all:
        patterns: ["*"]
